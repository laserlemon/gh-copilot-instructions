name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: lint (gofmt + vet + deadcode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      # gofmt -s: enforce standard formatting + simplifications, failing with the
      # list of offending files so the fix is obvious (gofmt -s -w .).
      - name: gofmt
        run: |
          unformatted=$(gofmt -s -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::these files need 'gofmt -s -w':"
            echo "$unformatted"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      # deadcode: this is a binary (all logic lives in internal/), so anything
      # unreachable from main() is genuinely dead and should be removed.
      - name: deadcode
        run: |
          go install golang.org/x/tools/cmd/deadcode@latest
          dead=$("$(go env GOPATH)/bin/deadcode" ./...)
          if [ -n "$dead" ]; then
            echo "::error::unreachable functions found (remove them):"
            echo "$dead"
            exit 1
          fi

  test:
    name: test (go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 1.25 is the go.mod floor (set by cli/go-gh/v2 upstream); `stable`
        # tracks new Go releases without a config change.
        go: ["1.25", "stable"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./...
