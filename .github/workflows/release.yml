name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: cli/gh-extension-precompile@v2
        with:
          # Build provenance attestations aren't available on user-owned PRIVATE
          # repos, so only request them when the repo is public. This turns on
          # automatically once the repository is made public — no edit needed.
          generate_attestations: ${{ !github.event.repository.private }}
          go_version_file: go.mod
          # Stamp the release tag into the binary so `doctor` can tell whether an
          # upgrade is available (read from main.version).
          go_build_options: -ldflags=-X=main.version=${{ github.ref_name }}
